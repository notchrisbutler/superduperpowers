name: Publish Latest Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Validate release without pushing main/latest, creating a GitHub Release, or publishing npm"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-latest
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release candidate
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' || github.ref_name == 'main' }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_tag: ${{ steps.version.outputs.release_tag }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Fetch published-state refs
        run: git fetch origin main latest --tags --prune

      - name: Validate release source
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_REF: refs/heads/main
        run: |
          set -euo pipefail
          git checkout main
          source_commit="$(git rev-parse HEAD)"
          origin_main="$(git rev-parse origin/main)"
          if [ "$source_commit" != "$origin_main" ]; then
            echo "Checked-out main ${source_commit} does not match origin/main ${origin_main}."
            exit 1
          fi
          if ! git merge-base --is-ancestor origin/latest HEAD; then
            echo "main is behind or diverged from latest; latest cannot fast-forward."
            exit 1
          fi
          if ! git merge-tree --write-tree origin/latest HEAD >/dev/null; then
            echo "latest cannot be fast-forwarded linearly to main."
            exit 1
          fi
          if [ ! -s CHANGELOG.md ]; then
            echo "CHANGELOG.md must exist and be non-empty."
            exit 1
          fi
          node scripts/release-gate.mjs --mode release

      - name: Prepare next release version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          npm run version:next
          version="$(node -p "require('./package.json').version")"
          release_tag="v${version}"
          if ! [[ "$release_tag" =~ ^v[0-9]{4}\.[0-9]{3,4}\.[0-9]+$ ]]; then
            echo "Release tag must be vYYYY.[M]MDD.N, found ${release_tag}."
            exit 1
          fi
          if git show-ref --tags --verify --quiet "refs/tags/${release_tag}"; then
            echo "Release tag ${release_tag} already exists."
            exit 1
          fi
          if gh release view "$release_tag" >/dev/null 2>&1; then
            echo "GitHub Release ${release_tag} already exists."
            exit 1
          fi
          {
            echo "version=${version}"
            echo "release_tag=${release_tag}"
          } >> "$GITHUB_OUTPUT"

      - name: Check version metadata
        run: npm run version:check

      - name: Audit version references
        run: npm run version:audit

      - name: Run workflow policy tests
        run: tests/opencode/test-workflow-policy.sh

      - name: Run agent and skill drift tests
        run: tests/opencode/test-agent-skill-drift.sh

      - name: Run installer CLI tests
        run: tests/opencode/test-installer-cli.sh

      - name: Run OpenCode tests
        run: tests/opencode/run-tests.sh

      - name: Check package contents
        run: npm pack --dry-run --json

      - name: Stop after release dry-run
        if: ${{ inputs.dry_run }}
        run: |
          echo "Release dry-run passed for ${{ steps.version.outputs.release_tag }}; main/latest were not pushed, no GitHub Release was created, and npm was not published."

  promote:
    name: Promote latest and create release
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ !inputs.dry_run }}
    environment: release
    permissions:
      contents: write
    outputs:
      version: ${{ needs.validate.outputs.version }}
      release_tag: ${{ needs.validate.outputs.release_tag }}
      release_commit: ${{ steps.commit.outputs.release_commit }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Fetch published-state refs
        run: git fetch origin main latest --tags --prune

      - name: Commit release version to main
        id: commit
        env:
          RELEASE_TAG: ${{ needs.validate.outputs.release_tag }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          npm run version:next
          actual_version="$(node -p "require('./package.json').version")"
          if [ "$actual_version" != "$VERSION" ]; then
            echo "Expected version ${VERSION}, but version:next produced ${actual_version}."
            exit 1
          fi
          npm run readme:release-verification
          git status --short
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -am "Bump version for ${RELEASE_TAG}"
          git push origin HEAD:main
          git fetch origin main latest --tags --prune
          release_commit="$(git rev-parse origin/main)"
          echo "release_commit=${release_commit}" >> "$GITHUB_OUTPUT"

      - name: Promote latest by fast-forward only
        env:
          RELEASE_COMMIT: ${{ steps.commit.outputs.release_commit }}
        run: |
          set -euo pipefail
          git checkout latest
          git merge --ff-only origin/main
          git push origin HEAD:latest
          git fetch origin latest --prune
          latest_commit="$(git rev-parse origin/latest)"
          if [ "$latest_commit" != "$RELEASE_COMMIT" ]; then
            echo "origin/latest ${latest_commit} does not equal release commit ${RELEASE_COMMIT}."
            exit 1
          fi

      - name: Create GitHub Release from latest
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.release_tag }}
        run: |
          set -euo pipefail
          git checkout latest
          gh release create "$RELEASE_TAG" --target latest --title "$RELEASE_TAG" --notes-file CHANGELOG.md --latest
          gh release view "$RELEASE_TAG" --json tagName,isDraft,isPrerelease,publishedAt,url

  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    needs: promote
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: latest
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify release metadata
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.promote.outputs.version }}
          RELEASE_TAG: ${{ needs.promote.outputs.release_tag }}
          RELEASE_COMMIT: ${{ needs.promote.outputs.release_commit }}
        run: |
          set -euo pipefail
          gh release view "$RELEASE_TAG" >/dev/null
          git fetch origin latest "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}" --depth=1
          package_version="$(node -p "require('./package.json').version")"
          latest_commit="$(git rev-parse origin/latest)"
          tag_commit="$(git rev-list -n 1 "$RELEASE_TAG")"
          if [ "$package_version" != "$VERSION" ]; then
            echo "package.json version ${package_version} does not match release version ${VERSION}."
            exit 1
          fi
          if [ "$latest_commit" != "$RELEASE_COMMIT" ]; then
            echo "origin/latest ${latest_commit} does not equal release commit ${RELEASE_COMMIT}."
            exit 1
          fi
          if [ "$tag_commit" != "$RELEASE_COMMIT" ]; then
            echo "Release tag ${RELEASE_TAG} points to ${tag_commit}, but release commit is ${RELEASE_COMMIT}."
            exit 1
          fi

      - name: Check version metadata
        run: npm run version:check

      - name: Validate package contents
        run: npm pack --dry-run --json

      - name: Dry run npm publish
        run: npm publish --access public --provenance --tag latest --dry-run

      - name: Publish to npm
        run: npm publish --access public --provenance --tag latest
