name: Publish package

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: "Raw version to publish, matching npm and GitHub Releases, for example YYYY.M.D or YYYY.M.D-N"
        required: true
        type: string
      dist_tag:
        description: "npm dist-tag to update"
        required: true
        default: "latest"
        type: choice
        options:
          - latest
      mode:
        description: "Use dry-run to validate without publishing"
        required: true
        default: "dry-run"
        type: choice
        options:
          - dry-run
          - publish
permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.event.release.tag_name || inputs.version }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Resolve release metadata
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PATH: ${{ github.event_path }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_DIST_TAG: ${{ inputs.dist_tag }}
          INPUT_MODE: ${{ inputs.mode }}
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import process from 'node:process';

          const env = process.env;
          const event = JSON.parse(fs.readFileSync(env.EVENT_PATH, 'utf8'));
          const isRelease = env.EVENT_NAME === 'release';
          const version = isRelease ? event.release?.tag_name : env.INPUT_VERSION;
          const distTag = isRelease ? 'latest' : env.INPUT_DIST_TAG;
          const mode = isRelease ? 'publish' : env.INPUT_MODE;

          if (isRelease && event.release?.prerelease) {
            throw new Error('Refusing to publish a GitHub prerelease to the npm latest dist-tag');
          }

          if (!/^\d+\.\d+\.\d+(?:-[1-9]\d*)?$/.test(version)) {
            throw new Error(`Version must be YYYY.M.D or YYYY.M.D-N: ${version}`);
          }
          if (distTag !== 'latest') {
            throw new Error(`Unsupported npm dist-tag: ${distTag}`);
          }
          if (!['dry-run', 'publish'].includes(mode)) {
            throw new Error(`Unsupported mode: ${mode}`);
          }

          fs.appendFileSync(env.GITHUB_ENV, `VERSION=${version}\nDIST_TAG=${distTag}\nMODE=${mode}\n`);
          console.log(`version=${version}`);
          console.log(`dist_tag=${distTag}`);
          console.log(`mode=${mode}`);
          NODE

      - name: Validate package metadata
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import process from 'node:process';

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          if (pkg.name !== 'superduperpowers') {
            throw new Error(`Unexpected package name: ${pkg.name}`);
          }
          if (pkg.private) {
            throw new Error('package.json must not be private for npm publishing');
          }
          if (pkg.repository?.url !== 'git+https://github.com/notchrisbutler/superduperpowers.git') {
            throw new Error(`Unexpected repository.url: ${pkg.repository?.url}`);
          }
          if (pkg.version !== process.env.VERSION) {
            throw new Error(`package.json version ${pkg.version} does not match release version ${process.env.VERSION}`);
          }
          NODE

      - name: Check version metadata
        run: npm run version:check

      - name: Validate package contents
        run: npm pack --dry-run

      - name: Dry run npm publish
        run: npm publish --access public --provenance --tag "$DIST_TAG" --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Stop after dry run
        if: ${{ env.MODE == 'dry-run' }}
        run: |
          echo "npm publish dry run passed for ${VERSION} with npm dist-tag ${DIST_TAG}."

      - name: Publish to npm
        if: ${{ env.MODE == 'publish' }}
        run: npm publish --access public --provenance --tag "$DIST_TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
