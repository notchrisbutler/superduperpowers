name: Publish package

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to validate in dry-run mode, for example YYYY.MMDD.N"
        required: true
        type: string
permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.event.release.tag_name || inputs.version }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Resolve release metadata
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PATH: ${{ github.event_path }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import process from 'node:process';

          const env = process.env;
          const event = JSON.parse(fs.readFileSync(env.EVENT_PATH, 'utf8'));
          const isRelease = env.EVENT_NAME === 'release';
          const release = event.release ?? {};
          const tagName = isRelease ? release.tag_name : `v${env.INPUT_VERSION}`;
          const distTag = 'latest';
          const mode = isRelease ? 'publish' : 'dry-run';

          if (isRelease && release.prerelease) {
            throw new Error('Refusing to publish a GitHub prerelease to the npm latest dist-tag');
          }

          if (!/^v[0-9]{4}\.[0-9]{4}\.[0-9]+$/.test(tagName)) {
            throw new Error(`Release tag must be vYYYY.MMDD.N: ${tagName}`);
          }
          if (!isRelease && !/^[0-9]{4}\.[0-9]{4}\.[0-9]+$/.test(env.INPUT_VERSION ?? '')) {
            throw new Error(`Workflow dispatch version must be YYYY.MMDD.N: ${env.INPUT_VERSION}`);
          }

          const version = tagName.slice(1);
          fs.appendFileSync(env.GITHUB_ENV, `VERSION=${version}\nRELEASE_TAG=${tagName}\nDIST_TAG=${distTag}\nMODE=${mode}\n`);
          console.log(`version=${version}`);
          console.log(`release_tag=${tagName}`);
          console.log(`dist_tag=${distTag}`);
          console.log(`mode=${mode}`);
          NODE

      - name: Validate package metadata
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import process from 'node:process';

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          if (pkg.name !== 'superduperpowers') {
            throw new Error(`Unexpected package name: ${pkg.name}`);
          }
          if (pkg.private) {
            throw new Error('package.json must not be private for npm publishing');
          }
          if (pkg.repository?.url !== 'git+https://github.com/notchrisbutler/superduperpowers.git') {
            throw new Error(`Unexpected repository.url: ${pkg.repository?.url}`);
          }
          if (pkg.version !== process.env.VERSION) {
            throw new Error(`package.json version ${pkg.version} does not match release version ${process.env.VERSION}`);
          }
          NODE

      - name: Check version metadata
        run: npm run version:check

      - name: Verify release tag matches latest
        if: ${{ github.event_name == 'release' }}
        run: |
          git fetch origin latest --depth=1
          release_commit="$(git rev-parse HEAD)"
          latest_commit="$(git rev-parse origin/latest)"
          if [ "$release_commit" != "$latest_commit" ]; then
            echo "Release tag ${RELEASE_TAG} points to ${release_commit}, but origin/latest is ${latest_commit}."
            exit 1
          fi

      - name: Validate package contents
        run: npm pack --dry-run --json

      - name: Dry run npm publish
        run: npm publish --access public --provenance --tag "$DIST_TAG" --dry-run

      - name: Stop after dry run
        if: ${{ env.MODE == 'dry-run' }}
        run: |
          echo "npm publish dry run passed for ${VERSION} with npm dist-tag ${DIST_TAG}."

      - name: Publish to npm
        if: ${{ github.event_name == 'release' && env.MODE == 'publish' }}
        run: npm publish --access public --provenance --tag "$DIST_TAG"
